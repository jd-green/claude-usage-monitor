name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: temp keychain (macOS — lets the real `security -i` roundtrip run)
        if: runner.os == 'macOS'
        run: |
          security create-keychain -p ci ci.keychain
          security default-keychain -s ci.keychain
          security unlock-keychain -p ci ci.keychain
          security set-keychain-settings ci.keychain
      - name: pytest (monitor + accounts logic)
        run: uv run --python 3.12 --with pytest --with "rich>=13.7" pytest tests/ -q
      - name: shell tests (statusline-dispatch)
        run: sh tests/test_dispatch.sh
